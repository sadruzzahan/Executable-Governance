kind = "web"
previewPath = "/"
title = "Executable Governance"
version = "1.0.0"
id = "artifacts/executable-governance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23479

[services.development]
run = "pnpm --filter @workspace/executable-governance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/executable-governance", "run", "build" ]
publicDir = "artifacts/executable-governance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23479"
BASE_PATH = "/"
