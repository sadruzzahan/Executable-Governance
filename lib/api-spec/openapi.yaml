openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Executable Governance API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Organization management
  - name: policies
    description: Policy management
  - name: rules
    description: Rule management
  - name: decisions
    description: Decision engine and audit log
  - name: users
    description: User management
  - name: analytics
    description: Analytics and reporting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Organizations
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete an organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Policies
  /policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List policies
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: [draft, published, archived, null]
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolicyWithStats"
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"

  /policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Get a policy with its rules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Policy with rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyWithRules"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: Update a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyBody"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePolicy
      tags: [policies]
      summary: Delete a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /policies/{id}/publish:
    post:
      operationId: publishPolicy
      tags: [policies]
      summary: Publish a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /policies/{id}/archive:
    post:
      operationId: archivePolicy
      tags: [policies]
      summary: Archive a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Rules
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List rules
      parameters:
        - name: policyId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: [draft, published, archived, null]
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleBody"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"

  /rules/{id}:
    get:
      operationId: getRule
      tags: [rules]
      summary: Get a rule with version history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule with versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleWithVersions"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRuleBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rules/{id}/publish:
    post:
      operationId: publishRule
      tags: [rules]
      summary: Publish a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rules/{id}/versions:
    get:
      operationId: getRuleVersions
      tags: [rules]
      summary: Get version history for a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleVersion"

  /rules/{id}/analyze:
    post:
      operationId: analyzeRule
      tags: [rules]
      summary: Analyze a rule for ambiguities, edge cases, and conflicts (streaming SSE — consume via raw fetch, not generated hook)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRuleBody"
      responses:
        "200":
          description: Server-sent events stream; final event contains full RuleAnalysis
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rules/{id}/simulate:
    post:
      operationId: simulateRule
      tags: [rules]
      summary: Simulate how a rule would decide a given scenario (streaming SSE — consume via raw fetch, not generated hook)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRuleBody"
      responses:
        "200":
          description: Server-sent events stream; final event contains full RuleSimulationResult
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rules/{id}/diff:
    get:
      operationId: getRuleVersionDiff
      tags: [rules]
      summary: Diff two versions of a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          required: true
          schema:
            type: integer
          description: Source version number
        - name: to
          in: query
          required: true
          schema:
            type: integer
          description: Target version number
      responses:
        "200":
          description: Diff between two versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersionDiff"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Decisions (audit log + engine)
  /decisions/evaluate:
    post:
      operationId: evaluateDecision
      tags: [decisions]
      summary: Evaluate a governance query against a policy's published rules and record the decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateDecisionBody"
      responses:
        "200":
          description: Decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResult"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Policy not published or has no published rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List decisions with optional filters (paginated, append-only audit log)
      parameters:
        - name: policyId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: outcome
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: [approved, denied, escalated, needs_review, null]
        - name: actor
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: ISO 8601 date string
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: ISO 8601 date string
        - name: page
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Paginated list of decisions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionList"

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Get a decision with full reasoning chain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision with full details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Analytics (wow endpoints)
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get platform summary stats
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Get recent rule and policy activity
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /analytics/policy-breakdown:
    get:
      operationId: getPolicyBreakdown
      tags: [analytics]
      summary: Get policy status breakdown by organization
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Policy breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyBreakdown"

  /analytics/decision-volume:
    get:
      operationId: getDecisionVolume
      tags: [analytics]
      summary: Get daily decision counts by outcome for the last 30 days
      responses:
        "200":
          description: Decision volume time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionVolume"

  /analytics/top-rules:
    get:
      operationId: getTopRules
      tags: [analytics]
      summary: Get top 5 most-triggered rules in the last 30 days
      responses:
        "200":
          description: Top triggered rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopRules"

  /analytics/coverage-gaps:
    get:
      operationId: getCoverageGaps
      tags: [analytics]
      summary: Get policies with coverage gaps (few rules or high exception rate)
      responses:
        "200":
          description: Coverage gap list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageGaps"

  /analytics/rule-health:
    get:
      operationId: getRuleHealth
      tags: [analytics]
      summary: Get published rules ranked by unresolved ambiguities and edge cases
      responses:
        "200":
          description: Rule health list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleHealth"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # Organization schemas
    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
      required:
        - name

    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]

    # Policy schemas
    Policy:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        domain:
          type: string
          description: "Policy domain e.g. expense, hr, security, contract"
        status:
          type: string
          enum: [draft, published, archived]
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - name
        - domain
        - status
        - version
        - createdAt
        - updatedAt

    PolicyWithStats:
      allOf:
        - $ref: "#/components/schemas/Policy"
        - type: object
          properties:
            ruleCount:
              type: integer
            publishedRuleCount:
              type: integer
            draftRuleCount:
              type: integer
            organizationName:
              type: string
          required:
            - ruleCount
            - publishedRuleCount
            - draftRuleCount
            - organizationName

    PolicyWithRules:
      allOf:
        - $ref: "#/components/schemas/Policy"
        - type: object
          properties:
            rules:
              type: array
              items:
                $ref: "#/components/schemas/Rule"
            organizationName:
              type: string
          required:
            - rules
            - organizationName

    CreatePolicyBody:
      type: object
      properties:
        organizationId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        domain:
          type: string
      required:
        - organizationId
        - name
        - domain

    UpdatePolicyBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        domain:
          type: ["string", "null"]

    # Rule schemas
    Rule:
      type: object
      properties:
        id:
          type: integer
        policyId:
          type: integer
        name:
          type: string
        naturalLanguageText:
          type: string
          description: "The plain English text of the rule"
        structuredRepresentation:
          description: "Structured condition/action JSON"
        outcome:
          type: string
          enum: [approved, denied, escalated, needs_review]
        priority:
          type: integer
        status:
          type: string
          enum: [draft, published, archived]
        version:
          type: integer
        resolvedAmbiguities:
          description: "JSON array of resolved ambiguity items"
        resolvedEdgeCases:
          description: "JSON array of resolved edge case items"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - policyId
        - name
        - naturalLanguageText
        - outcome
        - priority
        - status
        - version
        - createdAt
        - updatedAt

    RuleWithVersions:
      allOf:
        - $ref: "#/components/schemas/Rule"
        - type: object
          properties:
            versions:
              type: array
              items:
                $ref: "#/components/schemas/RuleVersion"
            policyName:
              type: string
          required:
            - versions
            - policyName

    RuleVersion:
      type: object
      properties:
        id:
          type: integer
        ruleId:
          type: integer
        version:
          type: integer
        naturalLanguageText:
          type: string
        structuredRepresentation:
          description: "Structured condition/action JSON snapshot"
        outcome:
          type: string
          enum: [approved, denied, escalated, needs_review]
        changedBy:
          type: ["string", "null"]
        changeNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ruleId
        - version
        - naturalLanguageText
        - outcome
        - createdAt

    CreateRuleBody:
      type: object
      properties:
        policyId:
          type: integer
        name:
          type: string
        naturalLanguageText:
          type: string
        outcome:
          type: string
          enum: [approved, denied, escalated, needs_review]
        priority:
          type: integer
        structuredRepresentation:
          description: "Structured condition/action JSON"
      required:
        - policyId
        - name
        - naturalLanguageText
        - outcome
        - priority

    RuleVersionDiff:
      type: object
      properties:
        ruleId:
          type: integer
        from:
          $ref: "#/components/schemas/RuleVersion"
        to:
          $ref: "#/components/schemas/RuleVersion"
        changes:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              before:
                description: Previous value (any JSON)
              after:
                description: New value (any JSON)
            required:
              - field
      required:
        - ruleId
        - from
        - to
        - changes

    AnalyzeRuleBody:
      type: object
      properties:
        naturalLanguageText:
          type: string
          description: "The rule text to analyze"
      required:
        - naturalLanguageText

    SimulateRuleBody:
      type: object
      properties:
        scenario:
          type: string
          description: "Plain-language scenario description to simulate"
        ruleText:
          type: string
          description: "Optional override rule text to simulate against (e.g. an unsaved draft). Defaults to the saved rule text when omitted."
      required:
        - scenario

    AmbiguityItem:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
          description: "The open question the rule leaves unresolved"
        suggestedResolution:
          type: string
          description: "AI-suggested resolution"
        field:
          type: ["string", "null"]
          description: "Which structured field this resolution maps to (kind, field, operator, value, currency, scope)"
        structuredUpdate:
          description: "Partial JSON patch to apply to structuredRepresentation when this suggestion is accepted"
          nullable: true
        resolved:
          type: boolean
      required:
        - id
        - question
        - suggestedResolution
        - resolved

    EdgeCaseItem:
      type: object
      properties:
        id:
          type: string
        scenario:
          type: string
          description: "A scenario the rule doesn't explicitly handle"
        suggestedBehavior:
          type: string
          description: "AI-suggested default behavior"
        field:
          type: ["string", "null"]
          description: "Which structured field this suggestion maps to"
        structuredUpdate:
          description: "Partial JSON patch to apply to structuredRepresentation when this suggestion is accepted"
          nullable: true
        resolved:
          type: boolean
      required:
        - id
        - scenario
        - suggestedBehavior
        - resolved

    ConflictItem:
      type: object
      properties:
        id:
          type: string
        conflictingRuleId:
          type: integer
        conflictingRuleName:
          type: string
        description:
          type: string
          description: "Explanation of the logical conflict"
        severity:
          type: string
          enum: [low, medium, high, critical]
      required:
        - id
        - conflictingRuleId
        - conflictingRuleName
        - description
        - severity

    RuleAnalysis:
      type: object
      properties:
        ambiguities:
          type: array
          items:
            $ref: "#/components/schemas/AmbiguityItem"
        edgeCases:
          type: array
          items:
            $ref: "#/components/schemas/EdgeCaseItem"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ConflictItem"
      required:
        - ambiguities
        - edgeCases
        - conflicts

    RuleSimulationResult:
      type: object
      properties:
        decision:
          type: string
          enum: [approved, denied, escalated, needs_review]
        reasoning:
          type: string
          description: "Plain-language explanation of the decision"
        conditionsMet:
          type: array
          items:
            type: string
          description: "Which conditions were satisfied"
        conditionsNotMet:
          type: array
          items:
            type: string
          description: "Which conditions were not satisfied"
      required:
        - decision
        - reasoning
        - conditionsMet
        - conditionsNotMet

    UpdateRuleBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        naturalLanguageText:
          type: ["string", "null"]
        outcome:
          type: ["string", "null"]
          enum: [approved, denied, escalated, needs_review, null]
        priority:
          type: ["integer", "null"]
        structuredRepresentation:
          description: "Structured condition/action JSON"
        resolvedAmbiguities:
          description: "JSON array of resolved ambiguity items"
        resolvedEdgeCases:
          description: "JSON array of resolved edge case items"
        changeNote:
          type: ["string", "null"]

    # User schemas
    User:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [reader, editor, approver, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - name
        - email
        - role
        - createdAt
        - updatedAt

    CreateUserBody:
      type: object
      properties:
        organizationId:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [reader, editor, approver, admin]
      required:
        - organizationId
        - name
        - email
        - role

    UpdateUserBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
          enum: [reader, editor, approver, admin, null]

    # Decision schemas
    EvaluateDecisionBody:
      type: object
      properties:
        policyId:
          type: integer
          description: "ID of the published policy to evaluate against"
        actor:
          type: string
          description: "Who is making the request (e.g. email, user ID)"
        action:
          type: string
          description: "What action they are attempting (e.g. submit_expense)"
        context:
          type: object
          additionalProperties: true
          description: "Key-value pairs of context fields (e.g. amount, currency, category)"
        scenario:
          type: string
          description: "Optional plain-language description of the scenario"
      required:
        - policyId
        - actor
        - action

    RuleRef:
      type: object
      properties:
        ruleId:
          type: integer
        name:
          type: string
        priority:
          type: integer
        outcome:
          type: string
          enum: [approved, denied, escalated, needs_review]
        matched:
          type: boolean
      required:
        - ruleId
        - name
        - priority
        - outcome
        - matched

    DecisionResult:
      type: object
      properties:
        id:
          type: integer
        decision:
          type: string
          enum: [approved, denied, escalated, needs_review]
        reason:
          type: string
        rulesApplied:
          type: array
          items:
            $ref: "#/components/schemas/RuleRef"
        confidence:
          type: integer
          description: "0-100 confidence score"
        explanation:
          type: string
        policyId:
          type: integer
        policyName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - decision
        - reason
        - rulesApplied
        - confidence
        - policyId
        - policyName
        - createdAt

    DecisionSummary:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: ["integer", "null"]
        policyId:
          type: ["integer", "null"]
        actor:
          type: string
        action:
          type: string
        outcome:
          type: string
          enum: [approved, denied, escalated, needs_review]
        confidence:
          type: integer
        explanation:
          type: ["string", "null"]
          description: AI-generated one-line explanation of the decision
        scenario:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        policyName:
          type: ["string", "null"]
        organizationName:
          type: ["string", "null"]
      required:
        - id
        - actor
        - action
        - outcome
        - confidence
        - createdAt

    DecisionDetail:
      allOf:
        - $ref: "#/components/schemas/DecisionSummary"
        - type: object
          properties:
            contextJson:
              type: object
              additionalProperties: true
            rulesAppliedJson:
              type: array
              items:
                type: object
                additionalProperties: true
            explanation:
              type: ["string", "null"]
          required:
            - contextJson
            - rulesAppliedJson

    DecisionList:
      type: object
      properties:
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/DecisionSummary"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - decisions
        - total
        - page
        - limit

    # Analytics schemas
    AnalyticsSummary:
      type: object
      properties:
        totalOrganizations:
          type: integer
        totalPolicies:
          type: integer
        publishedPolicies:
          type: integer
        draftPolicies:
          type: integer
        totalRules:
          type: integer
        publishedRules:
          type: integer
        draftRules:
          type: integer
        totalUsers:
          type: integer
        decisionsLast30d:
          type: integer
        approvalRate:
          type: integer
          description: Percentage 0-100
        exceptionRate:
          type: integer
          description: Percentage 0-100 (needs_review + escalated)
      required:
        - totalOrganizations
        - totalPolicies
        - publishedPolicies
        - draftPolicies
        - totalRules
        - publishedRules
        - draftRules
        - totalUsers
        - decisionsLast30d
        - approvalRate
        - exceptionRate

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [rule_created, rule_updated, rule_published, policy_created, policy_updated, policy_published, policy_archived]
        entityId:
          type: integer
        entityName:
          type: string
        entityType:
          type: string
          enum: [rule, policy]
        organizationName:
          type: string
        policyName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - entityId
        - entityName
        - entityType
        - organizationName
        - createdAt

    PolicyBreakdown:
      type: object
      properties:
        totalPolicies:
          type: integer
        byStatus:
          type: object
          properties:
            draft:
              type: integer
            published:
              type: integer
            archived:
              type: integer
          required:
            - draft
            - published
            - archived
        byDomain:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              count:
                type: integer
              publishedCount:
                type: integer
            required:
              - domain
              - count
              - publishedCount
      required:
        - totalPolicies
        - byStatus
        - byDomain

    DecisionVolumeDay:
      type: object
      properties:
        date:
          type: string
        approved:
          type: integer
        denied:
          type: integer
        escalated:
          type: integer
        needs_review:
          type: integer
        total:
          type: integer
      required:
        - date
        - approved
        - denied
        - escalated
        - needs_review
        - total

    DecisionVolume:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DecisionVolumeDay"
        total:
          type: integer
      required:
        - days
        - total

    TopRuleItem:
      type: object
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        policyId:
          type: integer
        policyName:
          type: string
        triggerCount:
          type: integer
        evalCount:
          type: integer
        approvedCount:
          type: integer
        deniedCount:
          type: integer
        escalatedCount:
          type: integer
        needsReviewCount:
          type: integer
      required:
        - ruleId
        - ruleName
        - policyId
        - policyName
        - triggerCount
        - evalCount
        - approvedCount
        - deniedCount
        - escalatedCount
        - needsReviewCount

    TopRules:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/TopRuleItem"
      required:
        - rules

    CoverageGapItem:
      type: object
      properties:
        policyId:
          type: integer
        policyName:
          type: string
        organizationName:
          type: string
        publishedRuleCount:
          type: integer
        needsReviewCount7d:
          type: integer
        gapReason:
          type: string
          enum: [few_rules, high_exceptions, both]
      required:
        - policyId
        - policyName
        - organizationName
        - publishedRuleCount
        - needsReviewCount7d
        - gapReason

    CoverageGaps:
      type: object
      properties:
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/CoverageGapItem"
      required:
        - gaps

    RuleHealthItem:
      type: object
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        policyId:
          type: integer
        policyName:
          type: string
        unresolvedAmbiguities:
          type: integer
        unresolvedEdgeCases:
          type: integer
        totalAmbiguities:
          type: integer
        totalEdgeCases:
          type: integer
        conflictSignals:
          type: integer
          description: Decisions in the last 30d where this rule was evaluated and outcome was needs_review
        humanOverrides:
          type: integer
          description: Number of times this rule has been manually edited (version count)
        healthScore:
          type: integer
      required:
        - ruleId
        - ruleName
        - policyId
        - policyName
        - unresolvedAmbiguities
        - unresolvedEdgeCases
        - totalAmbiguities
        - totalEdgeCases
        - conflictSignals
        - humanOverrides
        - healthScore

    RuleHealth:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RuleHealthItem"
      required:
        - rules
